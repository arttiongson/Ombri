<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Ombri — Home with Weather</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  html, body { margin: 0; padding: 0; background: #F0EEE9; overflow-x: hidden; }
  body {
    font-family: "Plus Jakarta Sans", -apple-system, system-ui, sans-serif;
    color: #28201A;
  }
  /* Scale the whole page down on viewports narrower than the phone frame (~440px).
     Phone mockup is a fixed 390px; without this it clips on the right. */
  @media (max-width: 440px) { body { zoom: 0.90; } }
  @media (max-width: 410px) { body { zoom: 0.82; } }
  @media (max-width: 380px) { body { zoom: 0.74; } }
  @media (max-width: 350px) { body { zoom: 0.66; } }
  .canvas-wrap {
    padding: 48px 40px 80px;
    max-width: 1300px;
    margin: 0 auto;
  }
  .canvas-header { margin-bottom: 40px; max-width: 780px; }
  .canvas-title {
    font-size: 28px; font-weight: 700; letter-spacing: -0.5px;
    color: #1F1A14;
  }
  .canvas-sub {
    font-size: 14px; line-height: 1.55; color: #6B5F4F;
    margin-top: 8px;
  }
  .frames {
    display: grid; grid-template-columns: repeat(2, auto);
    gap: 48px; justify-content: center; align-items: start;
  }
  @media (max-width: 900px) { body { zoom: 0.90; } }
  @media (max-width: 840px) { body { zoom: 0.85; } }
  @media (max-width: 760px) { body { zoom: 0.80; } }
  @media (max-width: 720px) {
    .canvas-wrap { padding: 32px 16px 64px; }
    .frames { grid-template-columns: 1fr; gap: 36px; }
    body { zoom: 1; }
  }

  /* Weather animation keyframes */
  @keyframes rainFall {
    0% { background-position: 0 0; }
    100% { background-position: 20px 400px; }
  }
  @keyframes rainFallV {
    0%   { transform: translate3d(0, -120px, 0); }
    100% { transform: translate3d(0, 900px, 0); }
  }
  @keyframes rainFallSteep {
    0% { background-position: 0 0; }
    100% { background-position: 60px 600px; }
  }
  @keyframes snowFall {
    0% { transform: translate3d(0, 0, 0); }
    100% { transform: translate3d(0, 100%, 0); }
  }
  @keyframes cloudDriftSlow {
    0% { transform: translateX(-30%); }
    100% { transform: translateX(130%); }
  }
  @keyframes cloudDriftFast {
    0% { transform: translateX(-40%); }
    100% { transform: translateX(140%); }
  }
  @keyframes cloudDriftMed {
    0% { transform: translateX(-25%); }
    100% { transform: translateX(125%); }
  }
  @keyframes lightningFlash {
    0%, 92%, 100% { opacity: 0; }
    93% { opacity: 0.85; }
    94% { opacity: 0.2; }
    95% { opacity: 0.6; }
    96.5% { opacity: 0; }
  }
  @keyframes snowflakeSway {
    0%, 100% { transform: translateX(0); }
    50% { transform: translateX(4px); }
  }
  .frame-cell {
    display: flex; flex-direction: column; align-items: center;
    gap: 4px; margin-bottom: 12px;
  }
  .frame-label {
    font-size: 11px; font-weight: 700; letter-spacing: 2px;
    color: #8C7B62; text-transform: uppercase;
    white-space: nowrap;
  }
  .frame-time {
    font-size: 12px; color: rgba(40,30,20,0.5);
    margin-bottom: 4px;
    white-space: nowrap;
  }
  .bare .canvas-header { display: none; }
  .bare .canvas-wrap { padding-top: 24px; }
</style>
</head>
<body>
<script>
  try {
    if (new URL(location.href).searchParams.has('bare')) {
      document.documentElement.classList.add('bare');
    }
  } catch (_) {}
</script>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel">
// Home.jsx — Ombri home screen redesign
// Four time-of-day variants. Composition pivots around celestial body position.

const PJS = '"Plus Jakarta Sans", -apple-system, system-ui, sans-serif';
const SF  = '-apple-system, "SF Pro Text", system-ui, sans-serif';

const palettes = {
  morning: {
    bg: '#0B1410',
    text: '#F2EFE6', text2: '#B8A88F', text3: '#776852',
    accent: '#2EAA5E', success: '#38C860', danger: '#F0704F', warning: '#E8B028',
    cardFill: 'rgba(255, 220, 160, 0.035)',
    border: 'rgba(255, 210, 140, 0.10)',
    hairline: 'rgba(255, 210, 140, 0.12)',
    pillBg: 'rgba(255, 210, 140, 0.06)',
    orbFrom: '#FFE4B5', orbTo: '#FFB347',
    tabBarTint: 'rgba(22, 16, 8, 0.55)',
  },
  afternoon: {
    bg: '#080E0A',
    text: '#E4F0E8', text2: '#80A890', text3: '#4A7058',
    accent: '#2EAA5E', success: '#38C860', danger: '#F05848', warning: '#E8B028',
    cardFill: 'rgba(255, 255, 255, 0.035)',
    border: 'rgba(46, 170, 94, 0.12)',
    hairline: 'rgba(46, 170, 94, 0.14)',
    pillBg: 'rgba(46, 170, 94, 0.08)',
    orbFrom: '#FFF8DC', orbTo: '#FFD166',
    tabBarTint: 'rgba(8, 14, 10, 0.55)',
  },
  sunset: {
    bg: '#150810',
    text: '#FAE8E8', text2: '#C6A0A8', text3: '#8C5F70',
    accent: '#E87A5C', success: '#38C860', danger: '#F05848', warning: '#E8B028',
    cardFill: 'rgba(255, 150, 100, 0.04)',
    border: 'rgba(232, 122, 92, 0.15)',
    hairline: 'rgba(232, 122, 92, 0.16)',
    pillBg: 'rgba(232, 122, 92, 0.08)',
    orbFrom: '#FFB088', orbTo: '#FF5632',
    tabBarTint: 'rgba(20, 8, 16, 0.55)',
  },
  night: {
    bg: '#060A14',
    text: '#E8EEF8', text2: '#8090B0', text3: '#4A5878',
    accent: '#5A8FD8', success: '#38C860', danger: '#F0704F', warning: '#E8B028',
    cardFill: 'rgba(180, 200, 240, 0.035)',
    border: 'rgba(120, 150, 200, 0.14)',
    hairline: 'rgba(120, 150, 200, 0.14)',
    pillBg: 'rgba(120, 150, 200, 0.07)',
    orbFrom: '#F4F6FC', orbTo: '#C8D0E4',
    tabBarTint: 'rgba(6, 10, 20, 0.55)',
  },
};

const greetings = {
  morning: 'Good morning',
  afternoon: 'Good afternoon',
  sunset: 'Evening, Art',
  night: 'Still up?',
};

function hex(color, alpha) {
  if (color.startsWith('rgba') || color.startsWith('rgb')) return color;
  const h = color.replace('#', '');
  const r = parseInt(h.slice(0, 2), 16);
  const g = parseInt(h.slice(2, 4), 16);
  const b = parseInt(h.slice(4, 6), 16);
  return 'rgba(' + r + ',' + g + ',' + b + ',' + alpha + ')';
}

const DOLLAR = String.fromCharCode(36);
const MINUS_DOLLAR = '-' + DOLLAR;

function fmt(n) {
  const abs = Math.abs(n);
  const s = abs.toLocaleString('en-US', { minimumFractionDigits: 0, maximumFractionDigits: 0 });
  return (n < 0 ? MINUS_DOLLAR : DOLLAR) + s;
}
function fmtK(n) {
  const abs = Math.abs(n);
  if (abs >= 1000) return (n < 0 ? MINUS_DOLLAR : DOLLAR) + (abs / 1000).toFixed(abs >= 10000 ? 0 : 1) + 'k';
  return (n < 0 ? MINUS_DOLLAR : DOLLAR) + abs.toFixed(0);
}

// ─── Background ───────────────────────────────────────────────
function Sky({ period, p, weather }) {
  const layersByPeriod = {
    morning: [
      'radial-gradient(ellipse 130% 90% at 85% 10%, rgba(255,180,90,0.44) 0%, rgba(255,216,154,0.24) 22%, rgba(255,228,181,0.09) 42%, transparent 62%)',
      'radial-gradient(ellipse 90% 70% at 55% 25%, rgba(255,216,154,0.18) 0%, transparent 55%)',
    ],
    afternoon: [
      'radial-gradient(ellipse 75% 60% at 85% 6%, rgba(255,216,154,0.22) 0%, rgba(240,230,140,0.12) 30%, transparent 65%)',
      'radial-gradient(ellipse 70% 55% at 50% 18%, rgba(255,228,181,0.08) 0%, transparent 60%)',
    ],
    sunset: [
      'radial-gradient(ellipse 140% 95% at 92% 18%, rgba(255,90,50,0.58) 0%, rgba(255,69,0,0.40) 18%, rgba(220,60,50,0.26) 35%, rgba(160,60,140,0.18) 55%, rgba(108,52,131,0.12) 72%, transparent 85%)',
      'radial-gradient(ellipse 105% 75% at 5% 35%, rgba(108,52,131,0.42) 0%, rgba(142,68,173,0.22) 35%, transparent 68%)',
      'linear-gradient(180deg, transparent 8%, rgba(255,140,66,0.14) 22%, rgba(231,76,60,0.10) 34%, rgba(108,52,131,0.08) 48%, transparent 62%)',
    ],
    night: [
      'radial-gradient(ellipse 95% 75% at 15% 15%, rgba(74,111,165,0.38) 0%, rgba(44,62,107,0.22) 35%, rgba(26,26,62,0.10) 58%, transparent 78%)',
      'radial-gradient(ellipse 85% 90% at 35% 12%, rgba(27,42,74,0.50) 0%, rgba(44,62,107,0.28) 45%, transparent 80%)',
      'radial-gradient(ellipse 55% 50% at 88% 28%, rgba(108,52,131,0.18) 0%, transparent 70%)',
    ],
  };
  const layers = layersByPeriod[period];

  return (
    <div style={{ position: 'absolute', inset: 0, background: p.bg, overflow: 'hidden' }}>
      {layers.map((bg, i) => (
        <div key={i} style={{ position: 'absolute', inset: 0, background: bg }} />
      ))}
      {period === 'night' && <Stars />}
    </div>
  );
}

function Stars() {
  const stars = [
    { x: 35, y: 15, r: 1.2, o: 0.9 }, { x: 52, y: 22, r: 0.8, o: 0.6 },
    { x: 60, y: 10, r: 1.0, o: 0.8 }, { x: 68, y: 18, r: 1.3, o: 0.95 },
    { x: 78, y: 24, r: 0.9, o: 0.55 }, { x: 84, y: 12, r: 1.1, o: 0.75 },
    { x: 92, y: 22, r: 0.7, o: 0.5 }, { x: 88, y: 30, r: 1.0, o: 0.7 },
    { x: 48, y: 32, r: 0.8, o: 0.5 }, { x: 40, y: 26, r: 1.1, o: 0.8 },
    { x: 25, y: 32, r: 0.9, o: 0.6 }, { x: 72, y: 35, r: 1.2, o: 0.85 },
    { x: 56, y: 38, r: 0.7, o: 0.45 }, { x: 82, y: 40, r: 0.9, o: 0.55 },
    { x: 38, y: 42, r: 0.8, o: 0.5 }, { x: 64, y: 28, r: 0.6, o: 0.45 },
  ];
  return (
    <svg style={{ position: 'absolute', inset: 0, width: '100%', height: '100%' }} viewBox="0 0 100 100" preserveAspectRatio="none">
      {stars.map((s, i) => (
        <circle key={i} cx={s.x} cy={s.y} r={s.r * 0.25} fill="#fff" opacity={s.o} />
      ))}
    </svg>
  );
}

// ─── Celestial body ───────────────────────────────────────────
// Big, atmospheric, behind the content. Multi-layered bloom + surface detail.
function Celestial({ period, p, pos, weather = 'clear' }) {
  // Under weather, render only a diffused glow — no disc, no craters.
  const diffused = weather !== 'clear';
  // ~2.5x previous sizes — becomes scenery rather than an icon.
  // v1 sizes were morning:86 afternoon:56 sunset:78 night:70 — scaled 1.2×, afternoon stays petite since it's now side-positioned.
  const sizeMap = { morning: 105, afternoon: 72, sunset: 95, night: 88 };
  const size = sizeMap[period];
  const isMoon = period === 'night';

  // Sun palette
  const sunCore = p.orbFrom;
  const sunMid  = p.orbTo;
  const sunRim  = period === 'sunset' ? '#C23A1A' : period === 'morning' ? '#E28533' : '#E8A436';

  // Two bloom layers only — wide atmospheric haze + soft corona.
  const bloomFar = size * 2.4;
  const bloomMid = size * 1.35;

  return (
    <div style={{
      position: 'absolute', left: pos.x + '%', top: pos.y + '%',
      width: size, height: size, transform: 'translate(-50%, -50%)',
      pointerEvents: 'none',
      // zIndex 5 -> between Sky (default stacking inside absolute inset:0 parent)
      // and the content layer (zIndex 10). Behind content, above sky gradients.
      zIndex: 5,
    }}>
      {/* Outer atmospheric bloom — very wide, very soft */}
      <div style={{
        position: 'absolute', left: '50%', top: '50%',
        width: bloomFar, height: bloomFar,
        transform: 'translate(-50%, -50%)',
        borderRadius: '50%',
        background: 'radial-gradient(circle, '
          + hex(sunMid, isMoon ? 0.14 : 0.22) + ' 0%, '
          + hex(sunMid, isMoon ? 0.06 : 0.10) + ' 28%, '
          + hex(sunMid, 0.03) + ' 52%, '
          + 'transparent 72%)',
        filter: 'blur(28px)',
      }} />

      {/* Soft corona — gentler than before, no hot edge */}
      <div style={{
        position: 'absolute', left: '50%', top: '50%',
        width: bloomMid, height: bloomMid,
        transform: 'translate(-50%, -50%)',
        borderRadius: '50%',
        background: 'radial-gradient(circle, '
          + hex(sunCore, isMoon ? 0.18 : 0.32) + ' 0%, '
          + hex(sunMid, 0.12) + ' 45%, '
          + 'transparent 78%)',
        filter: 'blur(14px)',
      }} />

      {/* The disc itself — hidden under weather (only the diffused glow shows) */}
      {!diffused && (isMoon ? (
        <Moon size={size} p={p} />
      ) : (
        <Sun size={size} core={sunCore} mid={sunMid} rim={sunRim} period={period} />
      ))}
    </div>
  );
}

// ─── Weather overlay ──────────────────────────────────────────
// Renders in front of Celestial glow, behind content (zIndex 7).
// Each weather composes: cloud bank + optional particles + optional effects.
function WeatherLayer({ weather, period, p, celestialPos }) {
  if (weather === 'clear') return null;
  return (
    <div style={{
      position: 'absolute', inset: 0, zIndex: 7,
      pointerEvents: 'none', overflow: 'hidden',
    }}>
      {weather === 'rain' && <RainWeather period={period} p={p} celestialPos={celestialPos} />}
      {weather === 'thunderstorm' && <ThunderstormWeather period={period} p={p} celestialPos={celestialPos} />}
      {weather === 'snow' && <SnowWeather period={period} p={p} celestialPos={celestialPos} />}
      {weather === 'windy' && <WindyWeather period={period} p={p} celestialPos={celestialPos} />}
    </div>
  );
}

// Soft blurred cloud blobs — positions can be tuned per weather
function CloudBank({ clouds, blur = 18, opacity = 0.55, tint = 'rgba(210,215,225,1)' }) {
  // clouds: [{ x, y, w, h }]  (% of parent)
  return (
    <div style={{
      position: 'absolute', inset: 0, opacity, filter: 'blur(' + blur + 'px)',
      mixBlendMode: 'screen',
    }}>
      {clouds.map((c, i) => (
        <div key={i} style={{
          position: 'absolute',
          left: c.x + '%', top: c.y + '%',
          width: c.w + '%', height: c.h + '%',
          borderRadius: '50%',
          background: 'radial-gradient(ellipse, ' + tint + ' 0%, transparent 65%)',
        }} />
      ))}
    </div>
  );
}

// Drifting cloud layer — uses CSS animation
function DriftCloud({ x, y, w, h, opacity, blur, dur, delay = 0, tint, blend = 'screen' }) {
  return (
    <div style={{
      position: 'absolute',
      left: 0, top: y + '%',
      width: w + '%', height: h + '%',
      animation: 'cloudDriftSlow ' + dur + 's linear ' + delay + 's infinite',
      willChange: 'transform',
    }}>
      <div style={{
        width: '100%', height: '100%',
        filter: 'blur(' + blur + 'px)',
        opacity,
        mixBlendMode: blend,
        borderRadius: '50%',
        background: 'radial-gradient(ellipse, ' + tint + ' 0%, transparent 70%)',
      }} />
    </div>
  );
}

function RainStreak({ x, delay, dur, angle, length, width, color, opacity }) {
  return (
    <div style={{
      position: 'absolute',
      left: x + '%', top: 0,
      animation: 'rainFallV ' + dur + 's linear ' + delay + 's infinite',
      willChange: 'transform',
    }}>
      <div style={{
        width: width + 'px', height: length + 'px',
        background: 'linear-gradient(180deg, transparent 0%, ' + color + ' 40%, ' + color + ' 100%)',
        transform: 'rotate(' + angle + 'deg)',
        transformOrigin: 'top center',
        opacity: opacity,
        borderRadius: width + 'px',
      }} />
    </div>
  );
}

function RainStreaks({ density, angle, length, width, color, dur, opacity }) {
  // Each streak has its own animation + delay — staggered so they don't all fall in one horizontal band.
  const streaks = [];
  for (let i = 0; i < density; i++) {
    streaks.push({
      x: ((i * 73) % 100),
      delay: -(((i * 131) % 100) / 100) * dur,  // negative delay = starts mid-animation
      speedJitter: 0.85 + (((i * 17) % 30) / 100),
    });
  }
  return (
    <div style={{ position: 'absolute', inset: 0, pointerEvents: 'none', overflow: 'hidden' }}>
      {streaks.map((s, i) => (
        <RainStreak key={i}
          x={s.x} delay={s.delay} dur={dur * s.speedJitter}
          angle={angle} length={length} width={width}
          color={color} opacity={opacity} />
      ))}
    </div>
  );
}

function RainWeather({ period, p, celestialPos }) {
  return (
    <>
      <div style={{
        position: 'absolute', inset: 0,
        background: 'linear-gradient(180deg, rgba(90,105,115,0.55) 0%, rgba(70,80,95,0.40) 45%, rgba(50,55,70,0.25) 100%)',
      }} />
      <div style={{ position: 'absolute', inset: 0 }}>
        <DriftCloud x={0} y={2}   w={55} h={16} opacity={0.6}  blur={22} dur={70} delay={0}   tint="rgba(160,165,175,1)" />
        <DriftCloud x={0} y={8}   w={45} h={14} opacity={0.45} blur={18} dur={90} delay={-20} tint="rgba(185,190,200,1)" />
        <DriftCloud x={0} y={16}  w={50} h={12} opacity={0.35} blur={16} dur={110} delay={-40} tint="rgba(200,205,215,1)" />
      </div>
      <RainStreaks density={40} angle={10} length={22} width={1.2} color="rgba(210,220,235,0.75)" dur={0.9} opacity={0.7} />
      <RainStreaks density={30} angle={10} length={14} width={1}   color="rgba(200,210,225,0.5)"  dur={1.3} opacity={0.55} />
      <div style={{
        position: 'absolute', left: 0, right: 0, bottom: 0, height: '30%',
        background: 'linear-gradient(0deg, rgba(40,50,60,0.4) 0%, transparent 100%)',
      }} />
    </>
  );
}

function ThunderstormWeather({ period, p, celestialPos }) {
  return (
    <>
      <div style={{
        position: 'absolute', inset: 0,
        background: 'linear-gradient(180deg, rgba(30,35,45,0.7) 0%, rgba(20,25,35,0.55) 50%, rgba(15,18,28,0.4) 100%)',
      }} />
      <div style={{ position: 'absolute', inset: 0 }}>
        <DriftCloud x={0} y={-2}  w={70} h={22} opacity={0.75} blur={26} dur={80} delay={0}   tint="rgba(60,65,75,1)" blend="normal" />
        <DriftCloud x={0} y={6}   w={55} h={18} opacity={0.65} blur={22} dur={100} delay={-25} tint="rgba(80,85,95,1)" blend="normal" />
        <DriftCloud x={0} y={14}  w={60} h={16} opacity={0.50} blur={20} dur={120} delay={-55} tint="rgba(100,105,115,1)" blend="normal" />
      </div>
      <RainStreaks density={55} angle={16} length={30} width={1.4} color="rgba(220,230,245,0.85)" dur={0.55} opacity={0.8} />
      <RainStreaks density={40} angle={16} length={20} width={1.1} color="rgba(210,220,240,0.6)"  dur={0.75} opacity={0.6} />
      <RainStreaks density={28} angle={16} length={12} width={0.8} color="rgba(200,210,230,0.4)"  dur={1.0}  opacity={0.4} />
      <div style={{
        position: 'absolute', inset: 0,
        background: 'radial-gradient(ellipse at 30% 20%, rgba(255,255,255,0.85) 0%, rgba(200,210,240,0.45) 35%, transparent 70%)',
        animation: 'lightningFlash 6.5s ease-in-out infinite',
        mixBlendMode: 'screen',
      }} />
      <svg viewBox="0 0 100 160" style={{
        position: 'absolute', top: '6%', left: '28%', width: 110, height: 180,
        animation: 'lightningFlash 6.5s ease-in-out infinite',
        filter: 'drop-shadow(0 0 8px rgba(220,230,255,0.9))',
      }}>
        <path d="M55,0 L38,52 L52,52 L30,110 L48,108 L22,160"
              stroke="rgba(240,245,255,0.95)" strokeWidth="2.2" fill="none" strokeLinejoin="round" strokeLinecap="round" />
      </svg>
    </>
  );
}

function SnowWeather({ period, p, celestialPos }) {
  // Sunset snow — pink/purple sky peeks through falling flakes.
  // Three layers of flakes at different sizes/speeds.
  const flakeLayer = (density, size, opacity, dur, offset = 0) => {
    const flakes = [];
    for (let i = 0; i < density; i++) {
      flakes.push({
        x: (i * 37 + offset * 13) % 100,
        y: (i * 59 + offset * 23) % 100,
      });
    }
    return (
      <div style={{
        position: 'absolute', inset: 0,
        animation: 'snowFall ' + dur + 's linear infinite',
        animationDelay: -offset + 's',
      }}>
        <svg viewBox="0 0 100 100" preserveAspectRatio="none"
             style={{ position: 'absolute', inset: 0, width: '100%', height: '100%', opacity }}>
          {flakes.map((f, i) => (
            <circle key={i} cx={f.x} cy={f.y} r={size} fill="white" />
          ))}
        </svg>
      </div>
    );
  };

  return (
    <>
      {/* Soft cool veil — preserves sunset warmth but dims it */}
      <div style={{

// Separate component so refs stay stable across renders
function SnowFlakeLayer({ density, size, opacity, dur, offset = 0 }) {
  // Deterministic pixel positions inside the 390×844 phone.
  const flakes = [];
  for (let i = 0; i < density; i++) {
    flakes.push({
      x: ((i * 37 + offset * 13) % 100),      // % of width
      y: ((i * 59 + offset * 23) % 100),      // % of height
      o: 0.55 + ((i % 4) * 0.12),
    });
  }

  return (
    <div style={{
      position: 'absolute', inset: 0,
      animation: 'snowFall ' + dur + 's linear infinite',
      animationDelay: (-offset * 2) + 's',
    }}>
      <div style={{
        position: 'absolute', inset: 0,
        animation: 'snowflakeSway 4s ease-in-out infinite',
      }}>
        {/* Two stacked sets so one scrolls in as the other scrolls out */}
        <div style={{ position: 'absolute', top: '-100%', left: 0, right: 0, height: '100%' }}>
          {flakes.map((f, i) => (
            <div key={i} style={{
              position: 'absolute',
              left: f.x + '%', top: f.y + '%',
              width: size * 2, height: size * 2,
              borderRadius: '50%', background: 'white', opacity: f.o * opacity,
              boxShadow: '0 0 ' + (size * 1.2) + 'px rgba(255,255,255,0.5)',
            }} />
          ))}
        </div>
        <div style={{ position: 'absolute', top: 0, left: 0, right: 0, height: '100%' }}>
          {flakes.map((f, i) => (
            <div key={i} style={{
              position: 'absolute',
              left: f.x + '%', top: f.y + '%',
              width: size * 2, height: size * 2,
              borderRadius: '50%', background: 'white', opacity: f.o * opacity,
              boxShadow: '0 0 ' + (size * 1.2) + 'px rgba(255,255,255,0.5)',
            }} />
          ))}
        </div>
      </div>
    </div>
  );
}

          fontFamily: SF, fontSize: 10.5, fontWeight: 600, letterSpacing: 0.6,
          color: p.text3, textTransform: 'uppercase',
        }}>{label}</div>
        <div style={{
          fontFamily: PJS, fontSize: 18, fontWeight: 700, color,
          marginTop: 3, fontVariantNumeric: 'tabular-nums', letterSpacing: -0.3,
        }}>{value}</div>
        {delta !== 0 ? (
          <div style={{
            fontFamily: SF, fontSize: 10.5, fontWeight: 500,
            color: isGood ? p.success : p.danger, marginTop: 2,
          }}>
            {delta > 0 ? '↑' : '↓'} {fmtK(Math.abs(delta))}
          </div>
        ) : (
          <div style={{ fontSize: 10.5, marginTop: 2, opacity: 0 }}>·</div>
        )}
      </div>
    );
  };

  const netStr = (net >= 0 ? '+' : '-') + fmtK(Math.abs(net));

  return (
    <div style={{ padding: '18px 20px 0' }}>
      <div style={{
        display: 'flex', alignItems: 'center',
        background: p.cardFill, border: '0.5px solid ' + p.border,
        borderRadius: 16, overflow: 'hidden',

        <div style={{ width: 0.5, height: 38, background: p.hairline }} />
        {cell('Spent', fmtK(data.spent), p.danger, spentDelta, true)}
        <div style={{ width: 0.5, height: 38, background: p.hairline }} />
        {cell('Net', netStr, net >= 0 ? p.success : p.danger, netDelta, false)}

  );
}

function SparkChart({ data, p }) {
  const W = 320, H = 96, PAD = 8;
  const max = Math.max(...data.map(d => Math.max(d.inc, d.exp)));
  const xs = data.map((_, i) => PAD + (i / (data.length - 1)) * (W - PAD * 2));
  const ysInc = data.map(d => H - PAD - (d.inc / max) * (H - PAD * 2));
  const ysExp = data.map(d => H - PAD - (d.exp / max) * (H - PAD * 2));

  const pathFrom = (ys) => ys.map((y, i) => (i === 0 ? 'M' : 'L') + xs[i] + ' ' + y).join(' ');
  const areaFrom = (ys) => pathFrom(ys) + ' L ' + xs[xs.length-1] + ' ' + (H-PAD) + ' L ' + xs[0] + ' ' + (H-PAD) + ' Z';

  return (
    <div style={{
      background: p.cardFill, border: '0.5px solid ' + p.border, borderRadius: 16,
      padding: '10px 8px 4px', position: 'relative',
    }}>
      <svg viewBox={'0 0 ' + W + ' ' + H} style={{ width: '100%', height: 96, display: 'block' }}>
        <defs>
          <linearGradient id="incFill" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stopColor={p.success} stopOpacity="0.28" />
            <stop offset="100%" stopColor={p.success} stopOpacity="0" />
          </linearGradient>
          <linearGradient id="expFill" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stopColor={p.danger} stopOpacity="0.28" />
            <stop offset="100%" stopColor={p.danger} stopOpacity="0" />
          </linearGradient>
        </defs>
        <path d={areaFrom(ysInc)} fill="url(#incFill)" />
        <path d={pathFrom(ysInc)} stroke={p.success} strokeWidth="2" fill="none" strokeLinecap="round" strokeLinejoin="round"/>
        <path d={areaFrom(ysExp)} fill="url(#expFill)" />
        <path d={pathFrom(ysExp)} stroke={p.danger} strokeWidth="2" fill="none" strokeLinecap="round" strokeLinejoin="round"/>
        <circle cx={xs[xs.length-1]} cy={ysInc[ysInc.length-1]} r="3" fill={p.success} />
        <circle cx={xs[xs.length-1]} cy={ysExp[ysExp.length-1]} r="3" fill={p.danger} />
      </svg>
      <div style={{
        display: 'flex', justifyContent: 'space-between', padding: '0 8px',
        fontFamily: SF, fontSize: 10, color: p.text3,
      }}>
        {data.map(d => <span key={d.m}>{d.m}</span>)}
      </div>
    </div>
  );
}

// ─── Canvas App ───────────────────────────────────────────────
const APP_TWEAKS = /*EDITMODE-BEGIN*/{
  "state": "populated",
  "showLabels": true
}/*EDITMODE-END*/;

const periods = ['morning', 'afternoon', 'sunset', 'night'];
const labels = {
  morning:   { name: 'MORNING',   sub: '6–11 am · sun right, content left' },
  afternoon: { name: 'AFTERNOON', sub: '11 am–5 pm · sun overhead, centered' },
  sunset:    { name: 'SUNSET',    sub: '5–8 pm · orange core, content left' },
  night:     { name: 'NIGHT',     sub: '8 pm–6 am · moon left, content right' },
};

// 4 TOD × weather pairings
const weatherPairs = [
  { period: 'morning',   weather: 'rain',         label: 'MORNING · RAIN',          sub: 'Cool grey veil over warm sunrise',      greeting: 'Cozy morning, Art' },
  { period: 'afternoon', weather: 'thunderstorm', label: 'AFTERNOON · THUNDERSTORM', sub: 'Heavy cloud, periodic lightning',      greeting: 'Take shelter, Art'  },
  { period: 'sunset',    weather: 'snow',         label: 'SUNSET · SNOW',           sub: 'Pink-purple sky through falling flakes', greeting: 'Bundle up, Art'    },
  { period: 'night',     weather: 'windy',        label: 'NIGHT · WINDY',           sub: 'Fast-drifting wisps across navy',       greeting: 'Breezy night, Art' },
];

function App() {
  const [state, setState] = React.useState(APP_TWEAKS.state);
  const [showLabels, setShowLabels] = React.useState(APP_TWEAKS.showLabels);
  const [editMode, setEditMode] = React.useState(false);

  React.useEffect(() => {
    const onMsg = (e) => {
      const d = e.data || {};
      if (d.type === '__activate_edit_mode') setEditMode(true);
      if (d.type === '__deactivate_edit_mode') setEditMode(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const persist = (edits) => {
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits }, '*');
  };

  const data = state === 'populated' ? POPULATED : EMPTY;

  return (
    <div className="canvas-wrap">
      <div className="canvas-header">
        <div className="canvas-title" data-screen-label="Canvas Title">
          Home — weather overrides the day
        </div>
        <p className="canvas-sub">
          Each phone keeps its time-of-day composition — sun/moon position, content alignment, palette undertones.
          Weather layers on top: clouds diffuse the celestial into a glow, particles fall, lightning strikes.
          Subtle animation throughout; tune the intensity via Tweaks.
        </p>
      </div>

      <div className="frames">
        {weatherPairs.map((pair) => (
          <div key={pair.period + '-' + pair.weather} className="frame-cell"
               data-screen-label={'Home — ' + pair.period + ' ' + pair.weather}>
            {showLabels && <div className="frame-label">{pair.label}</div>}
            {showLabels && <div className="frame-time">{pair.sub}</div>}
            <HomeScreen period={pair.period} weather={pair.weather} greeting={pair.greeting} data={data} />
          </div>
        ))}
      </div>

      {editMode && (
        <div style={{
          position: 'fixed', bottom: 24, right: 24, zIndex: 100,
          width: 260, background: 'rgba(255,255,255,0.96)',
          backdropFilter: 'blur(20px)', borderRadius: 18,
          boxShadow: '0 20px 60px rgba(0,0,0,0.18), 0 0 0 1px rgba(0,0,0,0.06)',
          padding: 16, fontFamily: '"Plus Jakarta Sans", sans-serif',
        }}>
          <div style={{ fontWeight: 700, fontSize: 14, marginBottom: 12 }}>Tweaks</div>
          <div style={{ fontSize: 11, fontWeight: 600, letterSpacing: 1, color: '#888', textTransform: 'uppercase', marginBottom: 6 }}>Data state</div>
          <div style={{ display: 'flex', gap: 6, marginBottom: 14 }}>
            {['populated', 'empty'].map(s => (
              <button key={s} onClick={() => { setState(s); persist({ state: s }); }}
                style={{
                  flex: 1, padding: '7px 10px', borderRadius: 10,
                  border: '1px solid ' + (state === s ? '#1B7A4A' : 'rgba(0,0,0,0.1)'),
                  background: state === s ? '#1B7A4A' : 'transparent',
                  color: state === s ? '#fff' : '#333',
                  fontFamily: 'inherit', fontWeight: 600, fontSize: 13, cursor: 'pointer',
                  textTransform: 'capitalize',
                }}>{s}</button>
            ))}
          </div>
          <div style={{ fontSize: 11, fontWeight: 600, letterSpacing: 1, color: '#888', textTransform: 'uppercase', marginBottom: 6 }}>Period labels</div>
          <button onClick={() => { setShowLabels(!showLabels); persist({ showLabels: !showLabels }); }}
            style={{
              width: '100%', padding: '7px 10px', borderRadius: 10,
              border: '1px solid rgba(0,0,0,0.1)',
              background: showLabels ? '#1B7A4A' : 'transparent',
              color: showLabels ? '#fff' : '#333',
              fontFamily: 'inherit', fontWeight: 600, fontSize: 13, cursor: 'pointer',
            }}>{showLabels ? 'On' : 'Off'}</button>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
